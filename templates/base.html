<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}The Inkwell{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1208;
      --paper: #f5f0e8;
      --cream: #ede7d9;
      --rust: #b84c2b;
      --muted: #7a6e60;
      --border: #d4c9b5;
      --ff-head: 'Playfair Display', Georgia, serif;
      --ff-body: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--ff-body);
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
      height: 64px;
    }

    .nav-logo {
      font-family: var(--ff-head);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-logo span { color: var(--rust); font-style: italic; }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--rust); }

    /* MAIN */
    main { flex: 1; }

    /* FOOTER */
    footer {
      background: var(--ink);
      color: var(--cream);
      text-align: center;
      padding: 2rem clamp(1.5rem, 5vw, 4rem);
      font-size: 0.85rem;
      letter-spacing: 0.03em;
    }



    {% block extra_styles %}
    .btn-delete {
  background: #b84c2b;
  color: white;
  border: none;
  padding: 0.5rem 1rem;
  margin-left: 0.5rem;
  cursor: pointer;
  border-radius: 3px;
}

.btn-delete:hover {
  background: #8f3a21;
}{% endblock %}
    
  </style>
</head>
<body>

  <nav>
    <a href="{% url 'home' %}" class="nav-logo">The <span>Ink</span>well</a>
    <ul class="nav-links">
      <li>
        <a href="{% url 'home' %}"
           {% if request.resolver_match.url_name == 'home' %}class="active"{% endif %}>
          Home
        </a>
      </li>
      <li>
        <a href="{% url 'about' %}"
           {% if request.resolver_match.url_name == 'about' %}class="active"{% endif %}>
          About
        </a>
      </li>
    </ul>
    <div class="nav-links">
       {% if user.is_authenticated %}
        
        <a href='{% url 'profile' %}' class = "btn">Hi, {{ user.username }}</a>

        <form method="POST" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" style="background:none; border:none; color:inherit; cursor:pointer;">Logout</button>
        </form>

    {% else %}

        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'register' %}">Register</a>

    {% endif %}
    </div>
  </nav>

  <main>
     <div class = 'container'>
      {%if messages%}
        {%for message in messages%}
        <div class = 'alert alert-{{message.tags}}'>
          {{message}}

        </div>
        {%endfor%}
      {%endif%}
    {%block content%}{%endblock%}

  </div>
  </main>

  <footer>
    <p>&copy; {% now "Y" %} The Inkwell</p>
  </footer>

 


  <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>

</body>
</html>
